<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{ --bg:#0f1116; --muted:#8b949e; --text:#c9d1d9; --text-strong:#f0f6fc; --accent:#79c0ff; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 620px at 50% -8%, #171a21 0%, var(--bg) 62%);
    color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;gap:30px;
  }
  .caption{font-size:26px;letter-spacing:.01em;color:var(--muted);font-weight:400}
  .caption b{color:var(--text-strong);font-weight:600}
  .frame{
    width:1120px;max-width:92vw;
    border-radius:16px;overflow:hidden;
    border:1px solid #2b313b;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.03);
    background:#0f1116;
  }
  .frame img{width:100%;display:block}
</style>
</head>
<body>
  <div class="caption" id="caption"></div>
  <div class="frame"><img id="shot"></div>
<script>
  const q = new URLSearchParams(location.search);
  document.getElementById('caption').innerHTML = q.get('caption') || '';
  document.getElementById('shot').src = q.get('src') || '';
</script>
</body>
</html>
